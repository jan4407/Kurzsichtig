<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fehlsichtigkeit VR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  #start-screen h1 { font-size: 22px; font-weight: 500; }
  #start-screen p { font-size: 14px; color: #aaa; max-width: 320px; line-height: 1.6; }
  #start-btn {
    margin-top: 12px;
    padding: 14px 36px;
    font-size: 16px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
  }
  #vr-container {
    display: none;
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  #vr-container.active { display: flex; }
  canvas#left, canvas#right {
    width: 50%;
    height: 100%;
    display: block;
  }
  #divider {
    position: absolute;
    left: 50%;
    top: 0;
    width: 3px;
    height: 100%;
    background: #000;
    transform: translateX(-50%);
    z-index: 10;
  }
  #controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .ctrl-btn {
    padding: 8px 18px;
    font-size: 13px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }
  #ipd-control {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 20;
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 20px;
  }
  #ipd-control label { font-size: 12px; color: #ccc; }
  #ipd-slider { width: 100px; accent-color: #fff; }
  #ipd-val { font-size: 12px; color: #fff; min-width: 28px; }
  #error-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #f88;
    font-size: 14px;
    text-align: center;
    padding: 16px;
    display: none;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Fehlsichtigkeits-Viewer</h1>
  <p>Kamera wird als Side-by-Side Bild für Google Cardboard dargestellt. Autofokus ist deaktiviert – die Unschärfe entsteht durch die vorgehaltene Linse.</p>
  <p style="font-size:12px;color:#777;">Bitte Kamerazugriff erlauben und Gerät im Querformat halten.</p>
  <button id="start-btn">Kamera starten</button>
</div>

<div id="vr-container">
  <canvas id="left"></canvas>
  <div id="divider"></div>
  <canvas id="right"></canvas>
  <div id="ipd-control">
    <label>Versatz</label>
    <input type="range" id="ipd-slider" min="0" max="80" value="30" step="1">
    <span id="ipd-val">30px</span>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="flip-btn">Kamera wechseln</button>
    <button class="ctrl-btn" id="exit-btn">Beenden</button>
  </div>
  <div id="error-msg"></div>
</div>

<video id="vid" autoplay playsinline muted style="display:none;"></video>

<script>
const vid = document.getElementById('vid');
const leftCanvas = document.getElementById('left');
const rightCanvas = document.getElementById('right');
const lCtx = leftCanvas.getContext('2d');
const rCtx = rightCanvas.getContext('2d');
const ipdSlider = document.getElementById('ipd-slider');
const ipdVal = document.getElementById('ipd-val');
const errMsg = document.getElementById('error-msg');

let stream = null;
let facingMode = 'environment';
let ipd = 30;
let animId = null;

ipdSlider.addEventListener('input', () => {
  ipd = parseInt(ipdSlider.value);
  ipdVal.textContent = ipd + 'px';
});

document.getElementById('start-btn').addEventListener('click', () => {
  startCamera();
});

document.getElementById('flip-btn').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

document.getElementById('exit-btn').addEventListener('click', () => {
  stopCamera();
  document.getElementById('vr-container').classList.remove('active');
  document.getElementById('start-screen').style.display = 'flex';
});

async function startCamera() {
  stopCamera();
  errMsg.style.display = 'none';

  const constraints = {
    video: {
      facingMode: facingMode,
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      focusMode: 'manual',
      advanced: [{ focusMode: 'manual', focusDistance: 0 }]
    }
  };

  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e1) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode } });
    } catch(e2) {
      showError('Kamera konnte nicht gestartet werden: ' + e2.message);
      return;
    }
  }

  vid.srcObject = stream;

  const track = stream.getVideoTracks()[0];
  if (track && track.getCapabilities) {
    const caps = track.getCapabilities();
    if (caps.focusMode && caps.focusMode.includes('manual')) {
      try {
        await track.applyConstraints({ advanced: [{ focusMode: 'manual', focusDistance: caps.focusDistance ? caps.focusDistance.min : 0 }] });
      } catch(e) {}
    }
  }

  await new Promise(r => { vid.onloadedmetadata = r; });
  vid.play();

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('vr-container').classList.add('active');

  if ('orientation' in screen && screen.orientation.lock) {
    try { await screen.orientation.lock('landscape'); } catch(e) {}
  }

  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);
  render();
}

function resizeCanvases() {
  const w = window.innerWidth / 2;
  const h = window.innerHeight;
  leftCanvas.width = w;
  leftCanvas.height = h;
  rightCanvas.width = w;
  rightCanvas.height = h;
}

function render() {
  if (!vid.videoWidth) { animId = requestAnimationFrame(render); return; }

  const vw = vid.videoWidth;
  const vh = vid.videoHeight;
  const cw = leftCanvas.width;
  const ch = leftCanvas.height;

  const scale = Math.max(cw / vw, ch / vh);
  const dw = vw * scale;
  const dh = vh * scale;

  const baseX = (cw - dw) / 2;
  const baseY = (ch - dh) / 2;

  lCtx.clearRect(0, 0, cw, ch);
  lCtx.drawImage(vid, baseX - ipd / 2, baseY, dw, dh);

  rCtx.clearRect(0, 0, cw, ch);
  rCtx.drawImage(vid, baseX + ipd / 2, baseY, dw, dh);

  animId = requestAnimationFrame(render);
}

function stopCamera() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  window.removeEventListener('resize', resizeCanvases);
}

function showError(msg) {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('vr-container').classList.add('active');
  errMsg.textContent = msg;
  errMsg.style.display = 'block';
}
</script>
</body>
</html>
